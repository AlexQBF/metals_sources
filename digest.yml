name: Daily Metals Digest

# Когда запускать
on:
  schedule:
    # ВНИМАНИЕ: время в cron указывается в UTC.
    # 06:00 UTC = 09:00 по Москве (МСК = UTC+3).
    - cron: "0 6 * * *"
  workflow_dispatch:   # позволяет запускать вручную кнопкой "Run workflow" в разделе Actions

jobs:
  build-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Получить код из репозитория
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Запустить бота-дайджест
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: python digest.py
