name: Daily Metals Digest

on:
  schedule:
    # 09:01 UTC = 12:01 МСК (МСК = UTC+3). Некруглая минута выбрана намеренно:
    # GitHub чаще задерживает/пропускает запуски на ровных часах из-за нагрузки.
    # ВНИМАНИЕ: GitHub может запускать с задержкой 5-30 мин и иногда пропускать слот —
    # это особенность бесплатного scheduled, не ошибка кода.
    - cron: "1 9 * * *"
  workflow_dispatch:   # ручной запуск кнопкой Run workflow

permissions:
  contents: write      # нужно, чтобы бот мог сохранять журналы и архив обратно в репозиторий

jobs:
  build-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Получить код из репозитория
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Запустить бота-дайджест
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          METALS_API_KEY: ${{ secrets.METALS_API_KEY }}
        run: python digest.py

      - name: Сохранить журналы и архив обратно в репозиторий
        run: |
          git config user.name "digest-bot"
          git config user.email "bot@users.noreplymail.github.com"
          git add sent.json recent_digests.json digests/ 2>/dev/null || true
          git commit -m "Обновление журналов дайджеста $(date -u +%Y-%m-%d)" || echo "Нет изменений для коммита"
          git push || echo "Нечего пушить"
