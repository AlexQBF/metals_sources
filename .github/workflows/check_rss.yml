name: Check RSS (диагностика)

on:
  workflow_dispatch:   # только ручной запуск

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Проверить RSS
        run: python check_rss.py
      - name: Выгрузить отчёт
        uses: actions/upload-artifact@v4
        with:
          name: rss-report
          path: rss_report.md
